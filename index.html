async function aiGenerateSheet(file) {
  if (!state.settings.apiKey) { showAiKeyHintModal(); return; }
  const MAX_BYTES = 20 * 1024 * 1024;
  if (file.size > MAX_BYTES) { toast("Datei zu groß – bitte unter 20 MB (PDF ggf. aufteilen)."); return; }
  const isPdf = file.type === "application/pdf" || /\.pdf$/i.test(file.name || "");
  const isImg = /^image\//.test(file.type || "");
  if (!isPdf && !isImg) { toast("Bitte ein PDF oder ein Bild auswählen."); return; }

  state.review = { stage: "working", progressText: "Datei wird vorbereitet…", abort: new AbortController(), fileName: file.name };
  render();
  const R = state.review;
  const setStatus = (t) => {
    R.progressText = t;
    const elx = document.getElementById("gen-status");
    if (elx) elx.textContent = t;
  };
  try {
    let contentBlock;
    if (isPdf) {
      const b64 = await readFileBase64(file);
      contentBlock = { type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 } };
    } else {
      const direct = ["image/jpeg", "image/png", "image/webp", "image/gif"].includes(file.type);
      if (direct && file.size < 1.5 * 1024 * 1024) {
        contentBlock = { type: "image", source: { type: "base64", media_type: file.type, data: await readFileBase64(file) } };
      } else {
        const b64 = await imageToJpegBase64(file, 2000);
        contentBlock = { type: "image", source: { type: "base64", media_type: "image/jpeg", data: b64 } };
      }
    }
    setStatus("Lernblatt wird erstellt…");
    const res = await anthropicFetch({
      model: GENERATION_MODEL,
      max_tokens: 64000,
      stream: true,
      thinking: { type: "adaptive" },
      output_config: { format: { type: "json_schema", schema: SHEET_SCHEMA } },
      system: SHEET_SYSTEM,
      messages: [{ role: "user", content: [contentBlock, {
        type: "text",
        text: "Erstelle ein Lernblatt aus dem angehängten Dokument. Vorhandene Fächer: " +
          (state.categories.length ? state.categories.map(c => c.name).join(", ") : "(noch keine)") + "."
      }] }]
    }, R.abort.signal);

    let acc = "";
    let truncatedByLimit = false;
    await streamSSE(res, (t) => {
      acc += t;
      const n = (acc.match(/"heading"/g) || []).length;
      if (n > 0) setStatus(n + " Abschnitte erstellt…");
    }, (ev) => {
      if (ev.type === "message_delta" && ev.delta && ev.delta.stop_reason === "max_tokens") truncatedByLimit = true;
    });

    const { sheet, truncated } = extractSheetFromText(acc);
    const clean = sanitizeSheet({
      id: uid(),
      title: sheet.title,
      fachName: sheet.fach,
      sections: sheet.sections,
      createdAt: Date.now()
    });
    if (!clean) {
      state.review = null;
      toast("Es konnte kein Lernblatt erstellt werden – bitte anderes Dokument versuchen.");
      if (parseRoute().name === "import") render();
      return;
    }
    state.sheets.unshift(clean);
    if (state.sheets.length > 50) { state.sheets = state.sheets.slice(0, 50); toast("Hinweis: Es werden maximal 50 Lernblätter gespeichert – das älteste wurde entfernt."); }
    saveSheets();
    state.review = null;
    if (truncatedByLimit || truncated) toast("⚠️ Das Dokument war sehr groß – das Lernblatt ist evtl. unvollständig.", 4200);
    if (parseRoute().name === "import") nav("#/blatt/" + encodeURIComponent(clean.id));
    else toast("📄 Lernblatt „" + clean.title.slice(0, 40) + "“ ist fertig!", 4500);
  } catch (e) {
    state.review = null;
    if (e && e.name === "AbortError") toast("Import abgebrochen.");
    else toast("⚠️ " + (e.message || "Lernblatt fehlgeschlagen."), 4000);
    if (parseRoute().name === "import") render();
  }
}
function viewBlaetter(app) {
  if (!state.sheets.length) {
    app.appendChild(el('<div class="empty"><div class="e-icon">📄</div><p>Noch keine Lernblätter. Lade im ✨ KI-Import ein PDF hoch und wähle „Lernblatt“.</p><button class="btn btn-primary" id="bl-go">Zum KI-Import</button></div>'));
    app.querySelector("#bl-go").onclick = () => nav("#/import");
    return;
  }
  state.sheets.forEach(sh => {
    const row = el('<div class="sheet-row"><span style="font-size:1.3rem">📄</span><div class="sr-txt"><div class="sr-title"></div><div class="sr-meta"></div></div><button class="task-del" aria-label="Löschen">🗑️</button></div>');
    row.querySelector(".sr-title").textContent = sh.title;
    row.querySelector(".sr-meta").textContent = (sh.fachName ? sh.fachName + " · " : "") + fmtDate(sh.createdAt);
    row.onclick = () => nav("#/blatt/" + encodeURIComponent(sh.id));
    row.querySelector(".task-del").onclick = async (e) => {
      e.stopPropagation();
      const ok = await confirmDialog("Lernblatt löschen?", "„" + sh.title.slice(0, 60) + "“ wird endgültig gelöscht.", "Löschen", true);
      if (!ok) return;
      state.sheets = state.sheets.filter(x => x.id !== sh.id);
      saveSheets(); toast("Lernblatt gelöscht"); render();
    };
    app.appendChild(row);
  });
}
function viewBlatt(app, id) {
  const sh = state.sheets.find(x => x.id === id);
  if (!sh) { nav("#/blaetter"); return; }
  const wrap = el('<div class="sheet-view"></div>');
  const h1 = el("<h1></h1>");
  h1.textContent = sh.title;
  wrap.appendChild(h1);
  const sub = el('<div class="sheet-sub"></div>');
  sub.textContent = (sh.fachName ? sh.fachName + " · " : "") + fmtDate(sh.createdAt) + " · ✨ KI-generiert";
  wrap.appendChild(sub);

  const btns = el('<div class="sheet-btns"><button class="btn btn-primary" id="sh-print">🖨️ Als PDF / Drucken</button><button class="btn btn-soft" id="sh-copy">📋 Text kopieren</button></div>');
  btns.querySelector("#sh-print").onclick = () => {
    const standalone = (navigator.standalone === true) || (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches);
    if (standalone) {
      toast("Drucken geht in der Home-Bildschirm-App leider nicht – öffne den Link einmal in Safari/Chrome oder nutze „Text kopieren“.", 5000);
      return;
    }
    window.print();
  };
  btns.querySelector("#sh-copy").onclick = async () => {
    const text = sh.title + "\n\n" + sh.sections.map(x => x.heading.toUpperCase() + "\n" + x.content).join("\n\n");
    try { await navigator.clipboard.writeText(text); toast("Lernblatt kopiert ✅"); }
    catch (e) { showBackupCopyModal(text, "Automatisches Kopieren war nicht möglich – markiere den Text und kopiere ihn manuell."); }
  };
  wrap.appendChild(btns);

  sh.sections.forEach(sec => {
    const box = el('<div class="sheet-sec"><h2></h2><div class="sec-content"></div></div>');
    box.querySelector("h2").textContent = sec.heading;
    box.querySelector(".sec-content").textContent = sec.content;
    wrap.appendChild(box);
  });

  const del = el('<button class="btn btn-ghost btn-block no-print" style="color:var(--danger);border-color:var(--danger)">🗑️ Lernblatt löschen</button>');
  del.onclick = async () => {
    const ok = await confirmDialog("Lernblatt löschen?", "„" + sh.title.slice(0, 60) + "“ wird endgültig gelöscht.", "Löschen", true);
    if (!ok) return;
    state.sheets = state.sheets.filter(x => x.id !== sh.id);
    saveSheets(); toast("Lernblatt gelöscht"); nav("#/blaetter");
  };
  wrap.appendChild(del);
  app.appendChild(wrap);
}

/* ================================================================
   KI-Bewertung im Prüfungsmodus
   ================================================================ */
const GRADE_SYSTEM =
  "Du bewertest Antworten in einer Lern-Prüfung fair und inhaltlich. Es zählt die Bedeutung, nicht der exakte Wortlaut. " +
  "Kleine Rechtschreibfehler und andere Formulierungen sind egal. " +
  "„teilweise_richtig“ bedeutet: Kern getroffen, aber Wesentliches fehlt oder ist ungenau. " +
  "Das Feedback ist 1–2 Sätze auf Deutsch, konstruktiv und konkret.";
const GRADE_SCHEMA = {
  type: "object",
  properties: {
    bewertung: { type: "string", enum: ["richtig", "teilweise_richtig", "falsch"] },
    feedback: { type: "string" }
  },
  required: ["bewertung", "feedback"],
  additionalProperties: false
};
async function examSubmitTyped(card, answer, btn, slot) {
  const E = state.exam;
  if (!E || E.grading) return;
  const userAnswer = String(answer || "").trim();
  if (!userAnswer) { toast("Bitte erst eine Antwort eingeben"); return; }
  E.grading = true;
  btn.disabled = true;
  btn.textContent = "KI bewertet… ⏳";
  try {
    const res = await anthropicFetch({
      model: state.settings.model,
      max_tokens: 1000,
      output_config: { format: { type: "json_schema", schema: GRADE_SCHEMA } },
      system: GRADE_SYSTEM,
      messages: [{
        role: "user",
        content: "Frage: " + card.front + "\nMusterantwort: " + card.back + "\nAntwort der Studentin: " + userAnswer + "\nBewerte die Antwort."
      }]
    });
    const data = await res.json();
    if (data && data.stop_reason === "max_tokens") throw new Error("Die KI-Antwort war zu lang – bitte erneut versuchen.");
    const textBlock = (data.content || []).find(b => b.type === "text");
    let verdictObj = null;
    try { verdictObj = JSON.parse(textBlock ? textBlock.text : ""); } catch (e) {}
    if (!verdictObj || !["richtig", "teilweise_richtig", "falsch"].includes(verdictObj.bewertung)) {
      throw new Error("Die KI-Bewertung war nicht lesbar – bitte erneut versuchen.");
    }
    E.grading = false;
    const v = verdictObj.bewertung;
    const icon = v === "richtig" ? "✅" : v === "teilweise_richtig" ? "🟡" : "❌";
    const lbl = v === "richtig" ? "Richtig!" : v === "teilweise_richtig" ? "Teilweise richtig" : "Leider falsch";
    slot.innerHTML = "";
    const fb = el(
      '<div class="result-item' + (v === "teilweise_richtig" ? " partial" : "") + '" style="border-left-color:' +
      (v === "richtig" ? "var(--success)" : v === "teilweise_richtig" ? "var(--warn)" : "var(--danger)") + '">' +
      '<div class="ri-q">' + icon + " " + lbl + "</div>" +
      '<div class="ri-a"></div><div class="ri-fb"></div></div>'
    );
    fb.querySelector(".ri-a").textContent = "Musterantwort: " + card.back;
    fb.querySelector(".ri-fb").textContent = "💬 " + (verdictObj.feedback || "");
    slot.appendChild(fb);
    const next = el('<button class="btn btn-primary btn-block" style="margin-top:10px">Weiter →</button>');
    next.onclick = () => examRecord(card, v, userAnswer, verdictObj.feedback || null);
    slot.appendChild(next);
    btn.style.display = "none";
    const ta = document.getElementById("ex-answer");
    if (ta) ta.disabled = true;
  } catch (e) {
    E.grading = false;
    btn.disabled = false;
    btn.textContent = "Nochmal mit KI versuchen ✨";
    slot.innerHTML = "";
    const f = el(
      '<div class="result-item"><div class="ri-q">⚠️ KI-Bewertung nicht möglich</div>' +
      '<div class="ri-a"></div><div class="ri-fb"></div></div>'
    );
    f.querySelector(".ri-a").textContent = e.message || "Unbekannter Fehler";
    f.querySelector(".ri-fb").textContent = "Musterantwort: " + card.back + " — Bewerte selbst:";
    slot.appendChild(f);
    const row = el('<div class="learn-btns" style="margin-top:10px"></div>');
    const w = el('<button class="btn btn-wrong">✗ War falsch</button>');
    const r2 = el('<button class="btn btn-right">✓ War richtig</button>');
    w.onclick = () => examRecord(card, "falsch", userAnswer, null);
    r2.onclick = () => examRecord(card, "richtig", userAnswer, null);
    row.appendChild(w); row.appendChild(r2);
    slot.appendChild(row);
  }
}

/* ================================================================
   Atemübung (ohne KI, ohne Key)
   ================================================================ */
let breathTimer = null;
const BREATH_PHASES = [["Einatmen…", 4000, 1], ["Halten…", 4000, 1], ["Ausatmen…", 6000, 0.72]];
function openBreath() {
  closeBreath();
  const ov = el(
    '<div id="breath-overlay">' +
    '<div id="breath-label">Mach es dir bequem…</div>' +
    '<div class="breath-circle" id="breath-circle"></div>' +
    '<div id="breath-count"></div>' +
    '<button class="btn btn-soft" id="breath-close">Beenden</button></div>'
  );
  document.body.appendChild(ov);
  ov.querySelector("#breath-close").onclick = closeBreath;
  let cycle = 0;
  const step = (i) => {
    const lbl = document.getElementById("breath-label");
    const circle = document.getElementById("breath-circle");
    const cnt = document.getElementById("breath-count");
    if (!lbl || !circle) return;
    const phase = BREATH_PHASES[i];
    if (i === 0) {
      cycle++;
      if (cycle > 8) {
        lbl.textContent = "Gut gemacht 🌸";
        if (cnt) cnt.textContent = "";
        breathTimer = setTimeout(closeBreath, 2600);
        return;
      }
      if (cnt) cnt.textContent = "Runde " + cycle + " von 8";
    }
    lbl.textContent = phase[0];
    let reduced = false;
    try { reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch (e) {}
    circle.style.transition = reduced ? "none" : "transform " + (phase[1] / 1000) + "s ease-in-out";
    circle.style.transform = "scale(" + phase[2] + ")";
    breathTimer = setTimeout(() => step((i + 1) % BREATH_PHASES.length), phase[1]);
  };
  breathTimer = setTimeout(() => step(0), 900);
}
function closeBreath() {
  clearTimeout(breathTimer);
  breathTimer = null;
  const ov = document.getElementById("breath-overlay");
  if (ov) ov.remove();
}

/* ================================================================
   Boot
   ================================================================ */
function boot() {
  try {
    loadState();
    applyTheme();
    if (!Store.available) {
      const b = document.getElementById("banner");
      b.textContent = "⚠️ Speichern nicht möglich (Privatmodus?). Deine Daten gehen beim Schließen verloren.";
      b.classList.add("show");
    }
    window.addEventListener("hashchange", render);
    if (!location.hash) location.hash = "#/home";
    wireChat();
    render();
  } catch (e) {
    try {
      const app = document.getElementById("app");
      app.innerHTML = "";
      const box = document.createElement("div");
      box.className = "empty";
      box.innerHTML = '<div class="e-icon">🛠️</div><p>Die App konnte nicht vollständig starten. Bitte Seite neu laden.</p>';
      const btn = document.createElement("button");
      btn.className = "btn btn-primary";
      btn.textContent = "Neu laden";
      btn.onclick = () => location.reload();
      box.appendChild(btn);
      app.appendChild(box);
    } catch (e2) {}
  }
}
boot();
