<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lernapp">
<meta name="theme-color" content="#FBF6EF">
<title>Firdevs' Lernapp</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20x='6'%20y='14'%20width='88'%20height='64'%20rx='12'%20fill='%23FF7A59'/%3E%3Crect%20x='6'%20y='26'%20width='88'%20height='64'%20rx='12'%20fill='%232A9D8F'/%3E%3Ctext%20x='50'%20y='72'%20font-size='40'%20text-anchor='middle'%20fill='white'%20font-family='sans-serif'%20font-weight='bold'%3EF%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20width='100'%20height='100'%20fill='%23FF7A59'/%3E%3Crect%20x='14'%20y='30'%20width='72'%20height='52'%20rx='10'%20fill='%232A9D8F'/%3E%3Ctext%20x='50'%20y='70'%20font-size='34'%20text-anchor='middle'%20fill='white'%20font-family='sans-serif'%20font-weight='bold'%3EF%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABAAQMAAACQp+OdAAAABlBMVEX/elkqnY9UDdF3AAAAG0lEQVQ4y2NgGAWjYBSMglEwCkbBKBgFwxsAAAiAAAH8pKfnAAAAAElFTkSuQmCC">
<style>
/* ============ Design-Tokens ============ */
:root{
  --bg:#FBF6EF;
  --surface:#FFFFFF;
  --surface2:#F4EDE3;
  --text:#2B2622;
  --text2:#6E645B;
  --accent:#FF7A59;
  --accent-soft:#FFE3DA;
  --secondary:#2A9D8F;
  --secondary-soft:#DDF0EE;
  --danger:#D9534F;
  --success:#3E9C5C;
  --warn:#E0A800;
  --border:#E7DCCE;
  --shadow:0 4px 18px rgba(90,70,50,.10);
  --shadow-lg:0 10px 32px rgba(90,70,50,.16);
  --radius:18px;
  --radius-sm:12px;
  --topbar-h:58px;
}
html[data-theme="dark"]{
  --bg:#1C1A17;
  --surface:#262320;
  --surface2:#302C28;
  --text:#F1EAE2;
  --text2:#A79C90;
  --accent:#FF8A6C;
  --accent-soft:#4A2E25;
  --secondary:#3FB3A5;
  --secondary-soft:#1F3835;
  --danger:#E06663;
  --success:#57B274;
  --warn:#D9B540;
  --border:#3B362F;
  --shadow:0 4px 18px rgba(0,0,0,.35);
  --shadow-lg:0 10px 32px rgba(0,0,0,.5);
}
/* ============ Basis ============ */
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior-y:none;
}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none;touch-action:manipulation}
a{color:var(--secondary)}
h1,h2,h3{line-height:1.25}
input,select,textarea{
  background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:11px 13px;width:100%;outline:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
::placeholder{color:var(--text2);opacity:.7}

/* ============ Layout ============ */
#banner{
  display:none;background:var(--warn);color:#241d00;font-size:.85rem;font-weight:600;
  padding:8px 14px;padding-top:calc(8px + env(safe-area-inset-top));text-align:center;
}
#banner.show{display:block}
#banner.show + #topbar{padding-top:8px}
#topbar{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;padding-top:calc(8px + env(safe-area-inset-top));
  padding-left:calc(14px + env(safe-area-inset-left));
  padding-right:calc(14px + env(safe-area-inset-right));
  background:var(--bg);background:color-mix(in srgb, var(--bg) 88%, transparent);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
#topbar .tb-title{font-weight:800;font-size:1.06rem;flex:1;display:flex;align-items:center;gap:8px;min-width:0}
#topbar .tb-title span.txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-btn{
  min-width:44px;min-height:44px;border-radius:14px;font-size:1.25rem;
  display:flex;align-items:center;justify-content:center;color:var(--text);
}
.tb-btn:active{background:var(--surface2)}
.streak-chip{
  display:flex;align-items:center;gap:4px;font-weight:800;font-size:.95rem;
  background:var(--accent-soft);color:var(--accent);border-radius:999px;padding:6px 12px;
}
#app{
  max-width:760px;margin:0 auto;
  padding:16px 14px calc(110px + env(safe-area-inset-bottom));
  padding-left:calc(14px + env(safe-area-inset-left));
  padding-right:calc(14px + env(safe-area-inset-right));
}

/* ============ Buttons ============ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border-radius:14px;padding:13px 20px;font-weight:700;font-size:1rem;
  min-height:48px;transition:transform .08s, filter .15s;
  user-select:none;-webkit-user-select:none;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:var(--shadow)}
.btn-secondary{background:var(--secondary);color:#fff}
.btn-soft{background:var(--surface2);color:var(--text)}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-danger{background:var(--danger);color:#fff}
.btn-block{width:100%}
.btn-sm{min-height:38px;padding:8px 14px;font-size:.9rem;border-radius:11px}
.btn:disabled{opacity:.5;pointer-events:none}

/* ============ Home: Fächer-Grid ============ */
.home-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.home-actions .btn{min-height:56px}
.section-label{font-size:.82rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin:20px 2px 10px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.cat-card{
  position:relative;background:var(--surface);border-radius:var(--radius);
  padding:16px 14px 14px;box-shadow:var(--shadow);cursor:pointer;
  border-top:5px solid var(--cat-color,var(--accent));
  display:flex;flex-direction:column;gap:8px;min-height:118px;
  transition:transform .1s;
  user-select:none;-webkit-user-select:none;
}
.cat-card:active{transform:scale(.97)}
.cat-card h3{font-size:1.02rem;word-break:break-word}
.cat-card .cat-meta{font-size:.83rem;color:var(--text2);margin-top:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cat-due{background:var(--accent-soft);color:var(--accent);font-weight:700;border-radius:999px;padding:2px 8px;font-size:.75rem}
.ring{position:absolute;top:12px;right:12px;width:34px;height:34px}
.ring text{font-size:11px;font-weight:700;fill:var(--text2)}

/* ============ Kartenliste ============ */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar input[type="search"]{flex:1;min-width:160px}
.chips{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.chip{
  border:1.5px solid var(--border);border-radius:999px;padding:7px 14px;
  font-size:.87rem;font-weight:600;color:var(--text2);background:var(--surface);
  min-height:38px;
}
.chip.active{background:var(--secondary);border-color:var(--secondary);color:#fff}
.card-row{
  background:var(--surface);border-radius:var(--radius-sm);box-shadow:var(--shadow);
  padding:13px 14px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;
}
.card-row .cr-txt{flex:1;min-width:0}
.card-row .cr-front{font-weight:700;word-break:break-word}
.card-row .cr-back{font-size:.87rem;color:var(--text2);margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
.badge-ai{
  display:inline-flex;align-items:center;gap:3px;font-size:.7rem;font-weight:800;
  background:var(--secondary-soft);color:var(--secondary);border-radius:6px;padding:2px 7px;
  vertical-align:2px;margin-left:6px;white-space:nowrap;
}
.badge-box{font-size:.7rem;font-weight:700;background:var(--surface2);color:var(--text2);border-radius:6px;padding:2px 7px;margin-left:6px;white-space:nowrap}

/* ============ Lernmodus ============ */
.learn-wrap{display:flex;flex-direction:column;gap:14px;min-height:calc(100vh - var(--topbar-h) - 120px);min-height:calc(100dvh - var(--topbar-h) - 40px)}
.progress-track{height:9px;background:var(--surface2);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:var(--secondary);border-radius:999px;transition:width .3s}
.learn-meta{display:flex;justify-content:space-between;font-size:.85rem;color:var(--text2);font-weight:600}
.card-scene{perspective:1200px;flex:1;display:flex;min-height:280px}
.card-inner{
  display:grid;flex:1;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,.2,.2,1);
  cursor:pointer;user-select:none;-webkit-user-select:none;
}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{
  grid-area:1/1;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--surface);border-radius:22px;box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:26px 22px;text-align:center;overflow:hidden;
  border-top:6px solid var(--cat-color,var(--accent));
}
.card-face.card-front{transform:translateZ(1px)}
.card-face.card-back{transform:rotateY(180deg)}
.card-face .face-label{font-size:.72rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:14px}
.card-face .face-text{font-size:1.25rem;font-weight:600;line-height:1.5;overflow-y:auto;max-height:52vh;max-height:52dvh;white-space:pre-wrap;word-break:break-word;width:100%}
.card-face .face-hintline{margin-top:16px;font-size:.83rem;color:var(--text2)}
.tip-box{
  background:var(--secondary-soft);color:var(--text);border-radius:var(--radius-sm);
  padding:12px 14px;font-size:.95rem;line-height:1.5;text-align:center;
}
.tip-box b{color:var(--secondary)}
.learn-btns{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  padding-bottom:calc(4px + env(safe-area-inset-bottom));
}
.learn-btns .btn{min-height:58px;font-size:1.05rem}
.learn-btns-single{grid-template-columns:1fr}
.btn-wrong{background:var(--danger);color:#fff}
.btn-right{background:var(--success);color:#fff}
.repeat-banner{
  background:var(--accent-soft);color:var(--accent);font-weight:700;text-align:center;
  border-radius:var(--radius-sm);padding:10px;font-size:.92rem;
}

/* ============ Abschluss / Ergebnis ============ */
.result-box{
  background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:28px 20px;text-align:center;display:flex;flex-direction:column;gap:12px;align-items:center;
}
.result-box .big{font-size:3rem;font-weight:900}
.result-box .pct{font-size:1.3rem;font-weight:800;color:var(--secondary)}
.result-list{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.result-item{background:var(--surface);border-radius:var(--radius-sm);padding:12px 14px;box-shadow:var(--shadow);border-left:4px solid var(--danger)}
.result-item.partial{border-left-color:var(--warn)}
.result-item .ri-q{font-weight:700}
.result-item .ri-a{font-size:.9rem;color:var(--text2);margin-top:4px;white-space:pre-wrap}
.result-item .ri-user{font-size:.9rem;margin-top:4px}
.result-item .ri-fb{font-size:.88rem;margin-top:6px;background:var(--surface2);border-radius:8px;padding:8px 10px}

/* ============ Statistik ============ */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-tile{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;text-align:center}
.stat-tile .val{font-size:1.7rem;font-weight:900;color:var(--accent)}
.stat-tile .lbl{font-size:.8rem;color:var(--text2);font-weight:600;margin-top:2px}
.stat-cat{background:var(--surface);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:14px;margin-bottom:10px}
.stat-cat h3{font-size:.98rem;display:flex;align-items:center;gap:8px}
.stat-cat .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.stat-cat .row{display:flex;justify-content:space-between;font-size:.86rem;color:var(--text2);margin-top:6px}
.boxbar{display:flex;gap:3px;margin-top:8px}
.boxbar div{flex:1;height:8px;border-radius:4px;background:var(--surface2);position:relative;overflow:hidden}
.boxbar div span{position:absolute;inset:0;background:var(--secondary);border-radius:4px}

/* ============ Formulare / Einstellungen ============ */
.form-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 16px;margin-bottom:14px}
.form-card h2{font-size:1.02rem;margin-bottom:12px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.85rem;font-weight:700;margin-bottom:6px;color:var(--text2)}
.field .hint{font-size:.8rem;color:var(--text2);margin-top:6px;line-height:1.45}
.switch-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.switch-row:last-child{border-bottom:none}
.switch-row .sw-lbl{font-weight:600;font-size:.95rem}
.switch-row .sw-sub{font-size:.79rem;color:var(--text2);margin-top:2px}
.switch{position:relative;width:52px;height:31px;flex-shrink:0}
.switch input{opacity:0;width:100%;height:100%;position:absolute;z-index:2;cursor:pointer;margin:0}
.switch .knob{
  position:absolute;inset:0;background:var(--border);border-radius:999px;transition:background .2s;
}
.switch .knob::after{
  content:"";position:absolute;top:3px;left:3px;width:25px;height:25px;border-radius:50%;
  background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25);transition:transform .2s;
}
.switch input:checked + .knob{background:var(--success)}
.switch input:checked + .knob::after{transform:translateX(21px)}
.color-palette{display:flex;gap:10px;flex-wrap:wrap}
.color-swatch{
  width:42px;height:42px;border-radius:50%;border:3px solid transparent;cursor:pointer;
}
.color-swatch.selected{border-color:var(--text);transform:scale(1.1)}

/* ============ Import / Review ============ */
.drop-zone{
  border:2.5px dashed var(--border);border-radius:var(--radius);padding:34px 18px;
  text-align:center;color:var(--text2);cursor:pointer;background:var(--surface);
}
.drop-zone .dz-icon{font-size:2.4rem;margin-bottom:8px}
.gen-progress{
  background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:26px 20px;text-align:center;display:flex;flex-direction:column;gap:12px;align-items:center;
}
.spinner{
  width:38px;height:38px;border-radius:50%;border:4px solid var(--surface2);
  border-top-color:var(--accent);animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.review-item{background:var(--surface);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:13px;margin-bottom:12px;display:flex;gap:10px}
.review-item.deselected{opacity:.45}
.review-item textarea{margin-bottom:8px;min-height:44px;resize:vertical;font-size:16px;padding:8px 10px}
.review-item .rv-body{flex:1;min-width:0}
.review-check{width:26px;height:26px;flex-shrink:0;margin-top:4px;accent-color:var(--secondary)}
.review-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}

/* ============ Chat ============ */
#chat-fab{
  position:fixed;z-index:60;
  right:calc(16px + env(safe-area-inset-right));
  bottom:calc(20px + env(safe-area-inset-bottom));
  width:60px;height:60px;border-radius:50%;
  background:var(--secondary);color:#fff;font-size:1.55rem;
  box-shadow:var(--shadow-lg);display:flex;align-items:center;justify-content:center;
}
#chat-fab:active{transform:scale(.94)}
body.learn-view #chat-fab{bottom:calc(96px + env(safe-area-inset-bottom))}
body.learn-view #app{padding-bottom:calc(16px + env(safe-area-inset-bottom))}
body.no-scroll{overflow:hidden}
#chat-panel{
  position:fixed;z-index:70;inset:0;display:none;flex-direction:column;justify-content:flex-end;
  background:rgba(0,0,0,.35);
}
#chat-panel.open{display:flex}
.chat-sheet{
  background:var(--bg);border-radius:22px 22px 0 0;box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;height:86vh;height:86dvh;max-width:760px;margin:0 auto;width:100%;
}
.chat-head{
  display:flex;align-items:center;gap:10px;padding:14px 16px 10px;border-bottom:1px solid var(--border);
}
.chat-head h2{font-size:1.05rem;flex:1}
.chat-ctx{
  display:flex;align-items:center;gap:6px;margin:8px 14px 0;
  background:var(--secondary-soft);color:var(--secondary);font-size:.82rem;font-weight:700;
  border-radius:999px;padding:6px 12px;width:fit-content;max-width:calc(100% - 28px);
}
.chat-ctx span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-ctx button{color:var(--secondary);font-size:1rem;min-width:24px;min-height:24px}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.msg{max-width:86%;border-radius:16px;padding:10px 14px;line-height:1.5;font-size:.96rem;white-space:pre-wrap;word-break:break-word}
.msg-user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:5px}
.msg-ai{align-self:flex-start;background:var(--surface);box-shadow:var(--shadow);border-bottom-left-radius:5px}
.msg-ai.streaming::after{content:"▍";animation:blink 1s steps(1) infinite;color:var(--secondary)}
@keyframes blink{50%{opacity:0}}
.chat-inputrow{
  display:flex;gap:8px;padding:10px 14px calc(12px + env(safe-area-inset-bottom));
  border-top:1px solid var(--border);align-items:flex-end;
}
.chat-inputrow textarea{flex:1;resize:none;max-height:120px;min-height:46px}
.chat-send{
  width:48px;height:48px;border-radius:50%;background:var(--accent);color:#fff;
  font-size:1.2rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
.chat-send.stop{background:var(--danger)}

/* ============ Modals ============ */
#modal-root{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.45);padding:18px}
#modal-root.open{display:flex}
.modal{
  background:var(--bg);border-radius:20px;box-shadow:var(--shadow-lg);
  width:100%;max-width:480px;max-height:86vh;max-height:86dvh;overflow-y:auto;padding:20px 18px;
  -webkit-overflow-scrolling:touch;
}
.modal h2{font-size:1.15rem;margin-bottom:14px}
.modal .modal-btns{display:flex;gap:10px;margin-top:18px}
.modal .modal-btns .btn{flex:1}

/* ============ Toasts ============ */
#toast-root{
  position:fixed;z-index:100;left:0;right:0;
  bottom:calc(90px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;padding:0 16px;
}
.toast{
  background:var(--text);color:var(--bg);border-radius:999px;padding:11px 20px;
  font-size:.9rem;font-weight:600;box-shadow:var(--shadow-lg);max-width:100%;
  animation:toast-in .25s ease-out;text-align:center;
}
@keyframes toast-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ============ Empty-States & Extras ============ */
.empty{
  text-align:center;color:var(--text2);padding:44px 18px;display:flex;flex-direction:column;gap:10px;align-items:center;
}
.empty .e-icon{font-size:3rem}
.empty p{max-width:320px;line-height:1.5}
.confetti-piece{
  position:fixed;top:-14px;z-index:110;width:10px;height:14px;pointer-events:none;
  animation:confetti-fall linear forwards;
}
@keyframes confetti-fall{
  to{transform:translateY(115vh) rotate(720deg);opacity:.6}
}
.back-link{display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--text2);margin-bottom:12px;min-height:44px;text-decoration:none}
@media (min-width:700px){
  .cat-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .home-actions{grid-template-columns:repeat(4,1fr)}
}

</head>
<body>
<div id="banner"></div>
<header id="topbar"></header>
<main id="app"></main>
<button id="chat-fab" aria-label="KI-Chat öffnen">💬</button>
<div id="chat-panel" role="dialog" aria-label="KI-Chat">
  <div class="chat-sheet">
    <div class="chat-head">
      <h2 id="chat-title">💬 KI-Tutor</h2>
      <button class="tb-btn" id="chat-new" title="Neuer Chat">🗑️</button>
      <button class="tb-btn" id="chat-close" title="Schließen">✕</button>
    </div>
    <div id="chat-ctx-slot"></div>
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-inputrow">
      <textarea id="chat-input" rows="1" placeholder="Frag mich etwas…"></textarea>
      <button class="chat-send" id="chat-send" aria-label="Senden">➤</button>
    </div>
  </div>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>
<script>
"use strict";
/* ================================================================
   Store — einziger Zugriffspfad auf localStorage (mit Fallback)
   ================================================================ */
const Store = (() => {
  const mem = {};
  let available = false;
  try {
    localStorage.setItem("lernapp.__test", "1");
    localStorage.removeItem("lernapp.__test");
    available = true;
  } catch (e) { available = false; }
  return {
    available,
    get(key, fallback) {
      try {
        const raw = available ? localStorage.getItem(key) : mem[key];
        return (raw === null || raw === undefined) ? fallback : JSON.parse(raw);
      } catch (e) { return fallback; }
    },
    set(key, value) {
      let raw;
      try { raw = JSON.stringify(value); } catch (e) { return false; }
      try {
        if (available) localStorage.setItem(key, raw); else mem[key] = raw;
        return true;
      } catch (e) {
        toast("Speichern fehlgeschlagen – Speicher voll? Bitte Backup exportieren!");
        return false;
      }
    },
    remove(key) {
      try { if (available) localStorage.removeItem(key); else delete mem[key]; } catch (e) {}
    }
  };
})();

/* ================================================================
   State & Persistenz
   ================================================================ */
const SCHEMA_VERSION = 1;
const K = {
  meta: "lernapp.meta",
  categories: "lernapp.categories",
  cards: "lernapp.cards",
  settings: "lernapp.settings",
  stats: "lernapp.stats",
  days: "lernapp.days",
  sheets: "lernapp.sheets"
};
const DEFAULT_SETTINGS = {
  apiKey: "",
  model: "claude-opus-4-8",
  theme: "auto",
  tipEnabled: true,
  shuffleEnabled: true,
  leitnerEnabled: false,
  keyboardShortcuts: true
};
const DEFAULT_STATS = {
  streak: { current: 0, best: 0, lastStudyDate: null },
  totals: { reviews: 0, correct: 0, wrong: 0 },
  examHistory: []
};
const CAT_COLORS = ["#FF7A59","#2A9D8F","#E9C46A","#8AB17D","#E76F51","#6D9DC5","#B56576","#7E6BB5"];
const LEITNER_DAYS = { 1: 0, 2: 1, 3: 3, 4: 7, 5: 14 };
const AI_MODELS = [
  { id: "claude-opus-4-8", label: "Claude Opus 4.8 (beste Qualität)" },
  { id: "claude-haiku-4-5", label: "Claude Haiku 4.5 (schnell & günstig)" }
];

function safeColor(c, idx) {
  return /^#[0-9A-Fa-f]{3,8}$/.test(String(c || "")) ? c : CAT_COLORS[(idx || 0) % CAT_COLORS.length];
}
function sanitizeCategory(c, i) {
  if (!c || typeof c !== "object" || !c.id) return null;
  return {
    id: String(c.id), name: String(c.name || "Fach").slice(0, 60), color: safeColor(c.color, i),
    createdAt: Number(c.createdAt) || Date.now(), order: Number(c.order) || i || 0
  };
}
function sanitizeCard(c) {
  if (!c || typeof c !== "object" || !c.id) return null;
  const front = String(c.front || "").slice(0, 1000).trim();
  const back = String(c.back || "").slice(0, 4000).trim();
  if (!front || !back) return null;
  return {
    id: String(c.id), categoryId: String(c.categoryId || ""), front, back,
    source: c.source === "ai" ? "ai" : "user",
    box: Math.min(5, Math.max(1, parseInt(c.box, 10) || 1)),
    dueAt: Number(c.dueAt) || null, lastReviewedAt: Number(c.lastReviewedAt) || null,
    timesCorrect: Number(c.timesCorrect) || 0, timesWrong: Number(c.timesWrong) || 0,
    createdAt: Number(c.createdAt) || Date.now(), updatedAt: Number(c.updatedAt) || Date.now()
  };
}
function sanitizeDays(obj) {
  const out = {};
  if (!obj || typeof obj !== "object" || Array.isArray(obj)) return out;
  Object.keys(obj).forEach(k => {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(k) || !Array.isArray(obj[k])) return;
    const list = obj[k].map(t => {
      if (!t || typeof t !== "object" || !t.id) return null;
      const text = String(t.text || "").slice(0, 300).trim();
      if (!text) return null;
      return { id: String(t.id), text, done: !!t.done, createdAt: Number(t.createdAt) || Date.now() };
    }).filter(Boolean);
    if (list.length) out[k] = list;
  });
  return out;
}
function sanitizeSheet(sh) {
  if (!sh || typeof sh !== "object" || !sh.id) return null;
  const title = String(sh.title || "").slice(0, 200).trim();
  const sections = (Array.isArray(sh.sections) ? sh.sections : []).map(sec => {
    if (!sec || typeof sec !== "object") return null;
    const heading = String(sec.heading || "").slice(0, 200).trim();
    const content = String(sec.content || "").slice(0, 8000).trim();
    if (!heading && !content) return null;
    return { heading: heading || "Abschnitt", content };
  }).filter(Boolean);
  if (!title || !sections.length) return null;
  return {
    id: String(sh.id), title,
    fachName: String(sh.fachName || "").slice(0, 60),
    sections, createdAt: Number(sh.createdAt) || Date.now()
  };
}
function sanitizeStats(st) {
  const d = JSON.parse(JSON.stringify(DEFAULT_STATS));
  if (!st || typeof st !== "object") return d;
  if (st.streak && typeof st.streak === "object") {
    d.streak.current = Number(st.streak.current) || 0;
    d.streak.best = Number(st.streak.best) || 0;
    d.streak.lastStudyDate = typeof st.streak.lastStudyDate === "string" ? st.streak.lastStudyDate : null;
  }
  if (st.totals && typeof st.totals === "object") {
    d.totals.reviews = Number(st.totals.reviews) || 0;
    d.totals.correct = Number(st.totals.correct) || 0;
    d.totals.wrong = Number(st.totals.wrong) || 0;
  }
  if (Array.isArray(st.examHistory)) d.examHistory = st.examHistory.filter(h => h && typeof h === "object").slice(0, 50);
  return d;
}

const state = {
  categories: [],
  cards: [],
  settings: Object.assign({}, DEFAULT_SETTINGS),
  stats: JSON.parse(JSON.stringify(DEFAULT_STATS)),
  days: {},         // Kalender-Checklisten: { "YYYY-MM-DD": [{id,text,done,createdAt}] }
  sheets: [],       // KI-Lernblätter
  care: { messages: [] },  // Seelsorge-Verlauf (nur RAM)
  learn: null,      // laufende Lern-Session
  exam: null,       // laufende Prüfung
  review: null,     // KI-Import-Vorschläge (nur RAM)
  chat: { open: false, mode: "tutor", messages: [], ctxCard: null, ctxInjected: false, dismissedFront: null, streaming: false, streamMode: null, abort: null }
};

function loadState() {
  const meta = Store.get(K.meta, { schemaVersion: SCHEMA_VERSION });
  if (meta.schemaVersion < SCHEMA_VERSION) {
    // Migrations-Gerüst für zukünftige Schema-Änderungen
    // switch (meta.schemaVersion) { case 0: ... }
  }
  Store.set(K.meta, { schemaVersion: SCHEMA_VERSION });
  const rawCats = Store.get(K.categories, []);
  const rawCards = Store.get(K.cards, []);
  state.categories = (Array.isArray(rawCats) ? rawCats : []).map(sanitizeCategory).filter(Boolean);
  state.cards = (Array.isArray(rawCards) ? rawCards : []).map(sanitizeCard).filter(Boolean);
  state.settings = Object.assign({}, DEFAULT_SETTINGS, Store.get(K.settings, {}));
  state.stats = sanitizeStats(Store.get(K.stats, null));
  state.days = sanitizeDays(Store.get(K.days, {}));
  const rawSheets = Store.get(K.sheets, []);
  state.sheets = (Array.isArray(rawSheets) ? rawSheets : []).map(sanitizeSheet).filter(Boolean).slice(0, 50);
}
let saveTimer = null;
const pendingKeys = new Set();
function persist(keys) {
  (keys || ["categories","cards","settings","stats"]).forEach(k => pendingKeys.add(k));
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSaves, 150);
}
function flushSaves() {
  clearTimeout(saveTimer);
  pendingKeys.forEach(k => Store.set(K[k], state[k]));
  pendingKeys.clear();
}
try {
  window.addEventListener("pagehide", flushSaves);
  document.addEventListener("visibilitychange", () => { if (document.visibilityState === "hidden") flushSaves(); });
} catch (e) {}
function saveCategories(){ persist(["categories"]); }
function saveCards(){ persist(["cards"]); }
function saveSettings(){ persist(["settings"]); }
function saveStats(){ persist(["stats"]); }
function saveDays(){ persist(["days"]); }
function saveSheets(){ persist(["sheets"]); }

/* ================================================================
   Helfer
   ================================================================ */
function uid() {
  return Date.now().toString(36) + "." + Math.random().toString(36).slice(2, 8);
}
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function el(html) {
  const t = document.createElement("template");
  t.innerHTML = html.trim();
  return t.content.firstElementChild;
}
function todayStr(d) {
  try { return (d || new Date()).toLocaleDateString("sv"); }
  catch (e) { const x = d || new Date(); return x.getFullYear() + "-" + String(x.getMonth()+1).padStart(2,"0") + "-" + String(x.getDate()).padStart(2,"0"); }
}
function getCategory(id) { return state.categories.find(c => c.id === id) || null; }
function cardsOf(catId) { return state.cards.filter(c => c.categoryId === catId); }
function dueCards(catId) {
  const now = Date.now();
  return cardsOf(catId).filter(c => !c.dueAt || c.dueAt <= now);
}
function shuffleArr(a) {
  const arr = a.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function firstWords(text, n) {
  const words = String(text || "").trim().split(/\s+/);
  return { hint: words.slice(0, n).join(" "), more: words.length > n };
}
function fmtDate(ts) {
  try { return new Date(ts).toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" }); }
  catch (e) { return ""; }
}

/* ================================================================
   Toast, Modal, Confirm, Konfetti
   ================================================================ */
function toast(msg, ms) {
  const root = document.getElementById("toast-root");
  if (!root) return;
  const t = el('<div class="toast"></div>');
  t.textContent = msg;
  root.appendChild(t);
  setTimeout(() => { t.style.opacity = "0"; t.style.transition = "opacity .3s"; }, (ms || 2600) - 300);
  setTimeout(() => t.remove(), ms || 2600);
}
function showModal(innerHTML, opts) {
  const root = document.getElementById("modal-root");
  root.innerHTML = '<div class="modal" role="dialog"></div>';
  root.firstElementChild.innerHTML = innerHTML;
  root.classList.add("open");
  root.onclick = (e) => { if (e.target === root && !(opts && opts.sticky)) closeModal(); };
  syncScrollLock();
  return root.firstElementChild;
}
function closeModal() {
  const root = document.getElementById("modal-root");
  root.classList.remove("open");
  root.innerHTML = "";
  root.onclick = null;
  syncScrollLock();
}
function syncScrollLock() {
  const lock = document.getElementById("modal-root").classList.contains("open") || state.chat.open;
  document.body.classList.toggle("no-scroll", lock);
}
function confirmDialog(title, text, okLabel, danger) {
  return new Promise(resolve => {
    const m = showModal(
      '<h2>' + esc(title) + '</h2>' +
      '<p style="color:var(--text2);line-height:1.5">' + esc(text) + '</p>' +
      '<div class="modal-btns">' +
      '<button class="btn btn-ghost" data-x="no">Abbrechen</button>' +
      '<button class="btn ' + (danger ? "btn-danger" : "btn-primary") + '" data-x="yes">' + esc(okLabel || "OK") + '</button>' +
      '</div>'
    );
    m.querySelector('[data-x="no"]').onclick = () => { closeModal(); resolve(false); };
    m.querySelector('[data-x="yes"]').onclick = () => { closeModal(); resolve(true); };
  });
}
function confetti() {
  const colors = ["#FF7A59","#2A9D8F","#E9C46A","#8AB17D","#E76F51"];
  for (let i = 0; i < 44; i++) {
    const p = el('<div class="confetti-piece"></div>');
    p.style.left = (Math.random() * 100) + "vw";
    p.style.background = colors[i % colors.length];
    p.style.animationDuration = (1.6 + Math.random() * 1.6) + "s";
    p.style.animationDelay = (Math.random() * .4) + "s";
    p.style.transform = "rotate(" + Math.floor(Math.random() * 360) + "deg)";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3800);
  }
}

/* ================================================================
   Theme
   ================================================================ */
function applyTheme() {
  const pref = state.settings.theme;
  const dark = pref === "dark" || (pref === "auto" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute("content", dark ? "#1C1A17" : "#FBF6EF");
}
function cycleTheme() {
  const order = ["auto", "light", "dark"];
  const idx = order.indexOf(state.settings.theme);
  state.settings.theme = order[(idx + 1) % order.length];
  saveSettings();
  applyTheme();
  toast("Theme: " + ({ auto: "Automatisch", light: "Hell", dark: "Dunkel" })[state.settings.theme]);
  renderTopbar();
}
try {
  if (window.matchMedia) {
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
      if (state.settings.theme === "auto") applyTheme();
    });
  }
} catch (e) {}

/* ================================================================
   Streak & Statistik-Erfassung
   ================================================================ */
function touchStreak() {
  const s = state.stats.streak;
  const today = todayStr();
  if (s.lastStudyDate === today) return;
  const yd = new Date(); yd.setDate(yd.getDate() - 1);
  const yesterday = todayStr(yd);
  s.current = (s.lastStudyDate === yesterday) ? s.current + 1 : 1;
  s.best = Math.max(s.best, s.current);
  s.lastStudyDate = today;
  saveStats();
  renderTopbar();
}
function effectiveStreak() {
  const st = state.stats.streak;
  if (!st.lastStudyDate) return 0;
  const yd = new Date(); yd.setDate(yd.getDate() - 1);
  return (st.lastStudyDate === todayStr() || st.lastStudyDate === todayStr(yd)) ? st.current : 0;
}
function recordAnswer(card, correct) {
  if (correct) {
    card.timesCorrect = (card.timesCorrect || 0) + 1;
    card.box = Math.min((card.box || 1) + 1, 5);
    state.stats.totals.correct++;
  } else {
    card.timesWrong = (card.timesWrong || 0) + 1;
    card.box = 1;
    state.stats.totals.wrong++;
  }
  state.stats.totals.reviews++;
  card.lastReviewedAt = Date.now();
  card.dueAt = Date.now() + LEITNER_DAYS[card.box] * 86400000;
  card.updatedAt = Date.now();
  touchStreak();
  saveCards(); saveStats();
}

/* ================================================================
   Router
   ================================================================ */
function nav(hash) { location.hash = hash; }
function parseRoute() {
  const h = (location.hash || "#/home").replace(/^#\/?/, "");
  const seg = h.split("/").filter(Boolean);
  let arg = seg[1] || null;
  if (arg) { try { arg = decodeURIComponent(arg); } catch (e) {} }
  return { name: seg[0] || "home", arg };
}
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  window.scrollTo(0, 0);
  const r = parseRoute();
  const views = {
    home: viewHome,
    fach: viewFach,
    lernen: viewLernen,
    pruefung: viewPruefungSetup,
    prueflauf: viewPruefungLauf,
    pruefergebnis: viewPruefungErgebnis,
    statistik: viewStatistik,
    import: viewImport,
    einstellungen: viewEinstellungen,
    kalender: viewKalender,
    tag: viewTag,
    blaetter: viewBlaetter,
    blatt: viewBlatt
  };
  const fn = views[r.name] || viewHome;
  document.body.classList.toggle("learn-view", r.name === "lernen" || r.name === "prueflauf");
  document.body.classList.toggle("print-sheet", r.name === "blatt");
  try {
    fn(app, r.arg);
  } catch (e) {
    app.innerHTML = "";
    app.appendChild(el('<div class="empty"><div class="e-icon">😵</div><p>Hier ist etwas schiefgelaufen. Zurück zur Startseite?</p><button class="btn btn-primary" onclick="location.hash=\'#/home\'">Zur Startseite</button></div>'));
  }
  renderTopbar();
}
function renderTopbar() {
  const tb = document.getElementById("topbar");
  const r = parseRoute();
  const titles = {
    home: "Firdevs' Lernapp",
    fach: (getCategory(r.arg) || {}).name || "Fach",
    lernen: "Lernen",
    pruefung: "Prüfungsmodus",
    prueflauf: "Prüfung läuft",
    pruefergebnis: "Ergebnis",
    statistik: "Statistik",
    import: "KI-Import",
    einstellungen: "Einstellungen",
    kalender: "Planer",
    tag: "Tagesplan",
    blaetter: "Lernblätter",
    blatt: "Lernblatt"
  };

/* ================================================================
   Tastaturkürzel (nur Desktop, nur im Lernmodus)
   ================================================================ */
document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  if (document.getElementById("breath-overlay")) { closeBreath(); e.stopImmediatePropagation(); }
  else if (document.getElementById("modal-root").classList.contains("open")) { closeModal(); e.stopImmediatePropagation(); }
  else if (state.chat.open) { closeChat(); e.stopImmediatePropagation(); }
});
document.addEventListener("keydown", (e) => {
  if (!state.settings.keyboardShortcuts) return;
  const r = parseRoute();
  if (r.name !== "lernen" || !state.learn) return;
  const tag = (document.activeElement && document.activeElement.tagName) || "";
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
  if (state.chat.open || document.getElementById("modal-root").classList.contains("open")) return;
  if (e.key === " ") { e.preventDefault(); learnFlip(); }
  else if (e.key === "ArrowRight" || e.key === "1") { e.preventDefault(); learnAnswer(true); }
  else if (e.key === "ArrowLeft" || e.key === "2") { e.preventDefault(); learnAnswer(false); }
  else if (e.key === "t" || e.key === "T") { e.preventDefault(); learnTip(); }
  else if (e.key === "Escape") { e.preventDefault(); learnQuit(); }
});

    ));
    return;
  }
  app.appendChild(el('<div class="section-label">Deine Fächer</div>'));

    const due = state.settings.leitnerEnabled ? dueCards(cat.id).length : 0;
    const answered = cards.filter(c => (c.timesCorrect || 0) + (c.timesWrong || 0) > 0);
    const pct = cards.length ? Math.round(answered.reduce((s, c) => s + (c.timesCorrect || 0), 0) /
      Math.max(1, answered.reduce((s, c) => s + (c.timesCorrect || 0) + (c.timesWrong || 0), 0)) * 100) : 0;
    const card = el(
      '<div class="cat-card" style="--cat-color:' + esc(cat.color) + '">' +
      "<h3>" + esc(cat.name) + "</h3>" +
      (answered.length ? ringSvg(pct) : "") +
      '<div class="cat-meta"><span>' + cards.length + " " + (cards.length === 1 ? "Karte" : "Karten") + "</span>" +
      (due > 0 ? '<span class="cat-due">' + due + " fällig</span>" : "") +
      "</div></div>"
    );
    card.onclick = () => nav("#/fach/" + encodeURIComponent(cat.id));

    app.appendChild(el('<div class="section-label">Lernblätter</div>'));

    row.onclick = () => nav("#/blaetter");
    app.appendChild(row);
  }
}
function ringSvg(pct) {
  const r = 13, c = 2 * Math.PI * r;
  const off = c * (1 - Math.min(100, Math.max(0, pct)) / 100);
  return '<svg class="ring" viewBox="0 0 34 34">' +
    '<circle cx="17" cy="17" r="' + r + '" fill="none" stroke="var(--surface2)" stroke-width="4"></circle>' +
    '<circle cx="17" cy="17" r="' + r + '" fill="none" stroke="var(--secondary)" stroke-width="4" stroke-linecap="round" ' +
    'stroke-dasharray="' + c.toFixed(1) + '" stroke-dashoffset="' + off.toFixed(1) + '" transform="rotate(-90 17 17)"></circle>' +
    '<text x="17" y="21" text-anchor="middle">' + pct + "</text></svg>";
}

/* ================================================================
   Lernmodus
   ================================================================ */
function startLearnFromCategory(catId) {
  const cat = getCategory(catId);
  const all = cardsOf(catId);
  const due = state.settings.leitnerEnabled ? dueCards(catId) : all;
  const useDue = state.settings.leitnerEnabled && due.length > 0 && due.length < all.length;
  const openSession = (cards, onlyDueUsed) => {
    if (!cards.length) {
      toast("Keine Karten zum Lernen");
      if (parseRoute().name === "lernen") nav("#/fach/" + encodeURIComponent(catId));
      return;
    }
    startLearnSession({
      title: cat ? cat.name : "Lernen",
      categoryId: catId,
      cardIds: (state.settings.shuffleEnabled ? shuffleArr(cards) : cards.slice()).map(c => c.id),
      onlyDue: onlyDueUsed
    });
  };
  if (useDue) {
    const m = showModal(
      "<h2>Was möchtest du lernen?</h2>" +
      '<p style="color:var(--text2)">' + due.length + " von " + all.length + " Karten sind fällig.</p>" +
      '<div class="modal-btns" style="flex-direction:column">' +
      '<button class="btn btn-primary" id="l-due">🔁 Nur fällige (' + due.length + ")</button>" +
      '<button class="btn btn-soft" id="l-all">Alle Karten (' + all.length + ")</button>" +
      '<button class="btn btn-ghost" id="l-cancel">Abbrechen</button></div>',
      { sticky: true }
    );
    const backToFach = () => { closeModal(); if (parseRoute().name === "lernen") nav("#/fach/" + encodeURIComponent(catId)); };
    m.querySelector("#l-due").onclick = () => { closeModal(); openSession(due, true); };
    m.querySelector("#l-all").onclick = () => { closeModal(); openSession(all, false); };
    m.querySelector("#l-cancel").onclick = backToFach;
  } else {
    openSession(all, false);
  }
}
function startLearnSession(opts) {
  state.learn = {
    title: opts.title || "Lernen",
    categoryId: opts.categoryId || null,
    queue: opts.cardIds.slice(),
    repeat: [],
    round: 1,
    roundTotal: opts.cardIds.length,
    flipped: false,
    tipShown: false,
    correct: 0,
    wrong: 0,
    done: false
  };
  nav("#/lernen/" + encodeURIComponent(opts.categoryId || "session"));
  if (parseRoute().name === "lernen") render();
}
function currentLearnCard() {
  const L = state.learn;
  if (!L || !L.queue.length) return null;
  return state.cards.find(c => c.id === L.queue[0]) || null;
}
function viewLernen(app, arg) {
  let L = state.learn;
  if (L && arg && arg !== "session" && L.categoryId !== arg) {
    state.learn = null; L = null;
  }
  if (!L) {
    if (arg && arg !== "session" && getCategory(arg)) { startLearnFromCategory(arg); return; }
    nav("#/home"); return;
  }
  if (L.done) { renderLearnSummary(app); return; }
  // Karten können zwischenzeitlich gelöscht worden sein
  L.queue = L.queue.filter(id => state.cards.some(c => c.id === id));
  L.repeat = L.repeat.filter(id => state.cards.some(c => c.id === id));
  if (!L.queue.length && !L.repeat.length) { L.done = true; renderLearnSummary(app); return; }
  if (!L.queue.length) { L.queue = L.repeat; L.repeat = []; L.round++; L.roundTotal = L.queue.length; }
  const card = currentLearnCard();
  if (!card) { L.done = true; renderLearnSummary(app); return; }
  const cat = getCategory(card.categoryId);
  const pos = L.roundTotal - L.queue.length + 1;

  const wrap = el('<div class="learn-wrap"></div>');
  if (L.round > 1) wrap.appendChild(el('<div class="repeat-banner">🔁 Wiederholen – Runde ' + L.round + "</div>"));
  wrap.appendChild(el(
    '<div><div class="learn-meta"><span>' + esc(L.title) + (cat && L.categoryId === null ? " · " + esc(cat.name) : "") + "</span><span>" + pos + " / " + L.roundTotal + "</span></div>" +
    '<div class="progress-track" style="margin-top:6px"><div class="progress-fill" style="width:' + Math.round(((pos - 1) / Math.max(1, L.roundTotal)) * 100) + '%"></div></div></div>'
  ));

  const scene = el('<div class="card-scene"></div>');
  const inner = el(
    '<div class="card-inner" id="learn-card" style="--cat-color:' + esc(cat ? cat.color : "#FF7A59") + '">' +
    '<div class="card-face card-front"><div class="face-label">Frage</div>' +
    '<div class="face-text"></div>' +
    '<div class="face-hintline">Tippen zum Umdrehen</div></div>' +
    '<div class="card-face card-back"><div class="face-label">Antwort</div>' +
    '<div class="face-text"></div></div></div>'
  );
  inner.querySelector(".card-front .face-text").textContent = card.front;
  inner.querySelector(".card-back .face-text").textContent = card.back;
  if (L.flipped) inner.classList.add("flipped");
  inner.onclick = () => learnFlip();
  scene.appendChild(inner);
  wrap.appendChild(scene);

  const tipSlot = el('<div id="tip-slot"></div>');
  if (L.tipShown && !L.flipped) tipSlot.appendChild(buildTipBox(card));
  wrap.appendChild(tipSlot);

  const btns = el('<div class="learn-btns" id="learn-btns"></div>');
  renderLearnButtons(btns, card);
  wrap.appendChild(btns);
  app.appendChild(wrap);
}
function buildTipBox(card) {
  const { hint, more } = firstWords(card.back, 5);
  const box = el('<div class="tip-box"></div>');
  box.innerHTML = "💡 Die Antwort beginnt mit: <b></b>" + (more ? " …" : "");
  box.querySelector("b").textContent = "„" + hint + "“";
  return box;
}
function renderLearnButtons(btns, card) {
  const L = state.learn;
  btns.innerHTML = "";
  if (!L.flipped) {
    btns.classList.add("learn-btns-single");
    if (state.settings.tipEnabled) {
      btns.classList.remove("learn-btns-single");
      const tip = el('<button class="btn btn-soft">💡 Tipp</button>');
      tip.onclick = learnTip;
      tip.disabled = L.tipShown;
      btns.appendChild(tip);
    }
    const flip = el('<button class="btn btn-secondary">Umdrehen</button>');
    flip.onclick = learnFlip;
    btns.appendChild(flip);
  } else {
    btns.classList.remove("learn-btns-single");
    const wrong = el('<button class="btn btn-wrong">✗ Falsch</button>');
    wrong.onclick = () => learnAnswer(false);
    const right = el('<button class="btn btn-right">✓ Richtig</button>');
    right.onclick = () => learnAnswer(true);
    btns.appendChild(wrong); btns.appendChild(right);
  }
}
function learnFlip() {
  const L = state.learn;
  if (!L || L.done) return;
  L.flipped = !L.flipped;
  const inner = document.getElementById("learn-card");
  if (inner) inner.classList.toggle("flipped", L.flipped);
  const tipSlot = document.getElementById("tip-slot");
  if (tipSlot && L.flipped) tipSlot.innerHTML = "";
  const btns = document.getElementById("learn-btns");
  const card = currentLearnCard();
  if (btns && card) renderLearnButtons(btns, card);
}
function learnTip() {
  const L = state.learn;
  if (!L || L.done || L.flipped || L.tipShown || !state.settings.tipEnabled) return;
  L.tipShown = true;
  const card = currentLearnCard();
  const tipSlot = document.getElementById("tip-slot");
  if (tipSlot && card) { tipSlot.innerHTML = ""; tipSlot.appendChild(buildTipBox(card)); }
  const btns = document.getElementById("learn-btns");
  if (btns && card) renderLearnButtons(btns, card);
}
function learnAnswer(correct) {
  const L = state.learn;
  if (!L || L.done || !L.flipped) return;
  const card = currentLearnCard();
  if (!card) return;
  recordAnswer(card, correct);
  if (correct) L.correct++; else { L.wrong++; L.repeat.push(card.id); }
  L.queue.shift();
  L.flipped = false;
  L.tipShown = false;
  if (!L.queue.length && !L.repeat.length) L.done = true;
  render();
}
function learnQuit() {
  const L = state.learn;
  if (!L) { nav("#/home"); return; }

function examRecord(card, verdict, userAnswer, feedback) {
  const E = state.exam;
  if (!E) return;
  E.results.push({ cardId: card.id, verdict, userAnswer, feedback });
  recordAnswer(card, verdict === "richtig");
  E.idx++;
  E.revealed = false;
  if (E.idx >= E.cardIds.length) {
    finishExam();
    nav("#/pruefergebnis");
  } else {
    render();
  }
}
function finishExam() {
  const E = state.exam;
  if (!E || E.finished) return;
  E.finished = true;
  const correct = E.results.filter(r => r.verdict === "richtig").length;
  const partial = E.results.filter(r => r.verdict === "teilweise_richtig").length;
  state.stats.examHistory.unshift({
    date: Date.now(), mode: E.mode, categoryIds: E.categoryIds,
    total: E.results.length, correct, partial, aiGraded: E.typed
  });
  state.stats.examHistory = state.stats.examHistory.slice(0, 50);
  saveStats();
}

/* ================================================================
   View: Kalender-Planer
   ================================================================ */
const calUi = { y: null, m: null };
function dayKey(y, m, d) {
  return y + "-" + String(m + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
}
function viewKalender(app) {
  const now = new Date();
  if (calUi.y === null) { calUi.y = now.getFullYear(); calUi.m = now.getMonth(); }
  const y = calUi.y, m = calUi.m;
  const monthName = new Date(y, m, 1).toLocaleDateString("de-DE", { month: "long", year: "numeric" });

  const head = el('<div class="cal-head"><button class="cal-nav" id="cal-prev" aria-label="Voriger Monat">←</button><h2></h2><button class="cal-nav" id="cal-next" aria-label="Nächster Monat">→</button></div>');
  head.querySelector("h2").textContent = monthName;
  head.querySelector("#cal-prev").onclick = () => { calUi.m--; if (calUi.m < 0) { calUi.m = 11; calUi.y--; } render(); };
  head.querySelector("#cal-next").onclick = () => { calUi.m++; if (calUi.m > 11) { calUi.m = 0; calUi.y++; } render(); };
  app.appendChild(head);

  const grid = el('<div class="cal-grid"></div>');
  ["Mo","Di","Mi","Do","Fr","Sa","So"].forEach(d => grid.appendChild(el('<div class="cal-dow">' + d + "</div>")));
  const firstOffset = (new Date(y, m, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const prevMonthDays = new Date(y, m, 0).getDate();
  for (let i = 0; i < firstOffset; i++) {
    grid.appendChild(el('<div class="cal-day other">' + (prevMonthDays - firstOffset + 1 + i) + "</div>"));
  }
  const today = todayStr();
  for (let d = 1; d <= daysInMonth; d++) {
    const key = dayKey(y, m, d);
    const tasks = state.days[key] || [];
    const doneN = tasks.filter(t => t.done).length;
    const cell = el('<div class="cal-day' + (key === today ? " today" : "") + '"><span>' + d + "</span>" +
      (tasks.length ? '<span class="cal-badge' + (doneN === tasks.length ? " alldone" : "") + '">' + doneN + "/" + tasks.length + "</span>" : "") +
      "</div>");
    cell.onclick = () => nav("#/tag/" + key);
    grid.appendChild(cell);
  }
  const totalCells = firstOffset + daysInMonth;
  const trailing = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= trailing; i++) grid.appendChild(el('<div class="cal-day other">' + i + "</div>"));
  app.appendChild(grid);
  app.appendChild(el('<p style="text-align:center;color:var(--text2);font-size:.84rem;margin-top:14px">Tippe auf einen Tag, um deine Checkliste zu planen. ✅</p>'));
}
function viewTag(app, dateStr) {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr || "")) { nav("#/kalender"); return; }
  const parts = dateStr.split("-").map(Number);
  const dt = new Date(parts[0], parts[1] - 1, parts[2]);
  if (dt.getFullYear() !== parts[0] || dt.getMonth() !== parts[1] - 1 || dt.getDate() !== parts[2]) { nav("#/kalender"); return; }
  calUi.y = parts[0]; calUi.m = parts[1] - 1;
  let title;
  try { title = dt.toLocaleDateString("de-DE", { weekday: "long", day: "numeric", month: "long", year: "numeric" }); }
  catch (e) { title = dateStr; }

  const h = el('<h2 style="font-size:1.1rem;margin-bottom:4px"></h2>');
  h.textContent = (dateStr === todayStr() ? "Heute · " : "") + title;
  app.appendChild(h);

  const progressSlot = el('<div style="margin:10px 0 16px"></div>');
  app.appendChild(progressSlot);

  const listSlot = el("<div></div>");
  app.appendChild(listSlot);

  const addRow = el('<div class="task-add"><input maxlength="300" placeholder="Neue Aufgabe, z. B. „Kapitel 3 lernen“"><button class="btn btn-primary" style="min-height:48px">➕</button></div>');
  const addInput = addRow.querySelector("input");
  const doAdd = () => {
    const text = addInput.value.trim();
    if (!text) return;
    if (!state.days[dateStr]) state.days[dateStr] = [];
    state.days[dateStr].push({ id: uid(), text, done: false, createdAt: Date.now() });
    saveDays();
    addInput.value = "";
    redraw();
    addInput.focus();
  };
  addRow.querySelector("button").onclick = doAdd;
  addInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); doAdd(); } });
  app.appendChild(addRow);

  function redraw() {
    const tasks = state.days[dateStr] || [];
    const doneN = tasks.filter(t => t.done).length;
    progressSlot.innerHTML = "";
    if (tasks.length) {
      progressSlot.appendChild(el(
        '<div><div class="learn-meta"><span>' + doneN + " von " + tasks.length + " erledigt" + (doneN === tasks.length ? " 🎉" : "") + "</span></div>" +
        '<div class="progress-track" style="margin-top:6px"><div class="progress-fill" style="width:' + Math.round((doneN / tasks.length) * 100) + '%"></div></div></div>'
      ));
    }
    listSlot.innerHTML = "";
    if (!tasks.length) {
      listSlot.appendChild(el('<div class="empty" style="padding:28px 12px"><div class="e-icon">📝</div><p>Noch nichts geplant für diesen Tag. Trag unten deine erste Aufgabe ein!</p></div>'));
      return;
    }
    tasks.forEach(t => {
      const row = el('<div class="task-row' + (t.done ? " done" : "") + '"><input type="checkbox" class="task-check"><span class="task-text"></span><button class="task-del" aria-label="Löschen">🗑️</button></div>');
      row.querySelector(".task-text").textContent = t.text;
      const check = row.querySelector(".task-check");
      check.checked = t.done;
      const toggle = () => {
        const wasAllDone = tasks.length > 0 && tasks.every(x => x.done);
        t.done = !t.done;
        saveDays();
        redraw();
        const nowAllDone = tasks.length > 0 && tasks.every(x => x.done);
        if (!wasAllDone && nowAllDone) confetti();
      };
      check.onchange = toggle;
      row.querySelector(".task-text").onclick = toggle;
      row.querySelector(".task-del").onclick = () => {
        state.days[dateStr] = tasks.filter(x => x.id !== t.id);
        if (!state.days[dateStr].length) delete state.days[dateStr];
        saveDays();
        redraw();
      };
      listSlot.appendChild(row);
    });
  }
  redraw();
}

    app.appendChild(el('<div class="section-label">Pro Fach</div>'));

      const cards = cardsOf(cat.id);
      const answers = cards.reduce((s2, c) => s2 + (c.timesCorrect || 0) + (c.timesWrong || 0), 0);
      const correct = cards.reduce((s2, c) => s2 + (c.timesCorrect || 0), 0);
      const boxCounts = [0, 0, 0, 0, 0];
      cards.forEach(c => boxCounts[Math.min(4, Math.max(0, (c.box || 1) - 1))]++);

        (state.settings.leitnerEnabled && cards.length
          ? '<div class="boxbar">' + boxCounts.map(n => '<div title="' + n + ' Karten"><span style="width:' + (cards.length ? Math.round((n / cards.length) * 100) : 0) + '%"></span></div>').join("") + "</div>" +
            '<div class="row"><span style="font-size:.72rem">Box 1 (neu)</span><span style="font-size:.72rem">Box 5 (sicher)</span></div>'
          : "") +
        "</div>"
      );
      app.appendChild(item);
    });
  }
  if (s.examHistory.length) {
    app.appendChild(el('<div class="section-label">Letzte Prüfungen</div>'));
    s.examHistory.slice(0, 10).forEach(h => {
      const modeLbl = { fach: "Ein Fach", kreuzquer: "Kreuz & Quer", alle: "Alle Karten" }[h.mode] || h.mode;
      const score = h.correct + (h.partial || 0) * 0.5;
      app.appendChild(el(
        '<div class="stat-cat"><div class="row" style="margin-top:0"><span><b>' + esc(modeLbl) + "</b>" +
        (h.aiGraded ? ' <span class="badge-ai">✨ KI</span>' : "") + "</span><span>" + fmtDate(h.date) + "</span></div>" +
        '<div class="row"><span>' + (score % 1 === 0 ? score : score.toFixed(1)) + " / " + h.total + " Punkte</span><span>" +
        Math.round((score / Math.max(1, h.total)) * 100) + " %</span></div></div>"
      ));
    });
  }
  if (!state.cards.length) {
    app.appendChild(el('<div class="empty"><div class="e-icon">📊</div><p>Sobald du lernst, siehst du hier deinen Fortschritt.</p></div>'));
  }
}

async function exportBackup() {
  const data = {
    app: "lernapp-firdevs",
    schemaVersion: SCHEMA_VERSION,
    exportedAt: new Date().toISOString(),
    categories: state.categories,
    cards: state.cards,
    stats: state.stats,
    days: state.days,
    sheets: state.sheets
  };
  const json = JSON.stringify(data, null, 2);
  const fname = "lernapp-backup-" + todayStr() + ".json";
  const standalone = (navigator.standalone === true) ||
    (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches);
  // In der Home-Bildschirm-App funktioniert der klassische Download nicht → Teilen-Dialog
  if (standalone && navigator.canShare && typeof File === "function") {
    try {
      const f = new File([json], fname, { type: "application/json" });
      if (navigator.canShare({ files: [f] })) {
        await navigator.share({ files: [f], title: fname });
        toast("Backup geteilt ✅");
        return;
      }
    } catch (e) {
      if (e && e.name === "AbortError") return; // Nutzerin hat Teilen abgebrochen
    }
  }
  if (standalone) { showBackupCopyModal(json); return; }
  try {
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
    toast("Backup wird heruntergeladen ⬇️");
  } catch (e) {
    showBackupCopyModal(json);
  }
}

function importBackupFile(file) {
  const reader = new FileReader();
  reader.onerror = () => toast("Datei konnte nicht gelesen werden");
  reader.onload = () => {
    let data;
    try { data = JSON.parse(reader.result); } catch (e) { toast("Keine gültige Backup-Datei"); return; }
    if (!data || data.app !== "lernapp-firdevs" || !Array.isArray(data.categories) || !Array.isArray(data.cards)) {
      toast("Das ist keine Lernapp-Backup-Datei"); return;
    }
    const m = showModal(
      "<h2>Backup laden</h2>" +
      '<p style="color:var(--text2);line-height:1.5">Das Backup enthält <b>' + data.categories.length + " Fächer</b> und <b>" + data.cards.length + " Karten</b> (Stand: " +
      esc(String(data.exportedAt || "").slice(0, 10) || "unbekannt") + ").</p>" +
      '<div class="modal-btns" style="flex-direction:column">' +
      '<button class="btn btn-primary" id="imp-merge">🔀 Zusammenführen (empfohlen)</button>' +
      '<button class="btn btn-danger" id="imp-replace">♻️ Alles ersetzen</button>' +
      '<button class="btn btn-ghost" id="imp-cancel">Abbrechen</button></div>'
    );
    m.querySelector("#imp-cancel").onclick = closeModal;
    m.querySelector("#imp-replace").onclick = () => {
      state.categories = data.categories.map(sanitizeCategory).filter(Boolean);
      const okCatIds = new Set(state.categories.map(c => c.id));
      state.cards = data.cards.map(sanitizeCard).filter(Boolean).filter(c => okCatIds.has(c.categoryId));
      state.stats = sanitizeStats(data.stats);
      state.days = sanitizeDays(data.days || {});
      const inSheets = (Array.isArray(data.sheets) ? data.sheets : []).map(sanitizeSheet).filter(Boolean);
      state.sheets = inSheets.slice(0, 50);
      saveCategories(); saveCards(); saveStats(); saveDays(); saveSheets();
      closeModal(); toast("Backup übernommen ✅"); render();
    };
    m.querySelector("#imp-merge").onclick = () => {
      const catIds = new Set(state.categories.map(c => c.id));
      data.categories.forEach((c, i) => {
        const sc = sanitizeCategory(c, state.categories.length);
        if (sc && !catIds.has(sc.id)) { state.categories.push(sc); catIds.add(sc.id); }
      });
      const cardIds = new Set(state.cards.map(c => c.id));
      let added = 0;
      data.cards.forEach(c => {
        const scd = sanitizeCard(c);
        if (scd && !cardIds.has(scd.id) && catIds.has(scd.categoryId)) { state.cards.push(scd); cardIds.add(scd.id); added++; }
      });
      const inDays = sanitizeDays(data.days || {});
      Object.keys(inDays).forEach(k => {
        const cur = state.days[k] || [];
        const ids = new Set(cur.map(t => t.id));
        inDays[k].forEach(t => { if (!ids.has(t.id)) { cur.push(t); ids.add(t.id); } });
        state.days[k] = cur;
      });
      const sheetIds = new Set(state.sheets.map(x => x.id));
      (Array.isArray(data.sheets) ? data.sheets : []).map(sanitizeSheet).filter(Boolean).forEach(sh => {
        if (!sheetIds.has(sh.id) && state.sheets.length < 50) { state.sheets.push(sh); sheetIds.add(sh.id); }
      });
      saveCategories(); saveCards(); saveDays(); saveSheets();
      closeModal(); toast(added + " neue Karten übernommen ✅"); render();
    };
  };
  reader.readAsText(file);
}
/* ================================================================
   KI-Anbindung — zentrale Fetch-Funktion & Fehler-Mapping
   ================================================================ */
const API_URL = "https://api.anthropic.com/v1/messages";
const GENERATION_MODEL = "claude-opus-4-8"; // fix: 1M Kontext für große PDFs
function mapApiError(status, apiMsg) {
  const msgs = {
    400: "Die KI hat die Anfrage abgelehnt.",
    401: "API-Schlüssel ungültig – bitte in den Einstellungen prüfen.",
    403: "Der API-Schlüssel hat keine Berechtigung für diese Funktion.",
    404: "KI-Modell nicht gefunden – bitte Modell in den Einstellungen wechseln.",
    413: "Die Datei ist zu groß für die Verarbeitung.",
    429: "Zu viele Anfragen – bitte einen Moment warten und erneut versuchen.",
    500: "Der KI-Dienst ist gerade überlastet – bitte später erneut versuchen.",
    529: "Der KI-Dienst ist gerade überlastet – bitte später erneut versuchen."
  };
  const base = msgs[status] || ("KI-Fehler (" + status + ") – bitte später erneut versuchen.");
  return new Error(base + (apiMsg ? " Details: " + apiMsg : ""));
}
async function anthropicFetch(body, signal) {
  if (!state.settings.apiKey) throw new Error("Kein API-Schlüssel hinterlegt – bitte in den Einstellungen eintragen.");
  let res;
  try {
    res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "content-type": "application/json",
        "x-api-key": state.settings.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify(body),
      signal
    });
  } catch (e) {
    if (e && e.name === "AbortError") throw e;
    throw new Error("Keine Internetverbindung – bitte Verbindung prüfen.");
  }
  if (!res.ok) {
    let apiMsg = "";
    try {
      const j = await res.json();
      if (j && j.error && j.error.message) apiMsg = String(j.error.message).slice(0, 200);
    } catch (e) {}
    throw mapApiError(res.status, apiMsg);
  }
  return res;
}
async function streamSSE(res, onText, onEvent) {
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const parts = buf.split("\n\n");
    buf = parts.pop();
    for (const part of parts) {
      const line = part.split("\n").find(l => l.startsWith("data: "));
      if (!line) continue;
      let ev;
      try { ev = JSON.parse(line.slice(6)); } catch (e) { continue; }
      if (ev.type === "content_block_delta" && ev.delta && ev.delta.type === "text_delta") onText(ev.delta.text);
      else if (ev.type === "error") throw new Error((ev.error && ev.error.message) || "Fehler im KI-Datenstrom.");
      else if (onEvent) onEvent(ev);
    }
  }
}

      stream: true,
      system: chat.mode === "care" ? CARE_SYSTEM : CHAT_SYSTEM,
      messages: apiMessages
    }, chat.abort.signal);

    }
  }

function wireChat() {

  });

    if (e.target === document.getElementById("chat-panel")) closeChat();
  });
  if (window.visualViewport) {

    const adjustForKeyboard = () => {
      if (!state.chat.open) return;
      const sheet = document.querySelector(".chat-sheet");
      if (!sheet) return;
      const kb = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      if (kb > 60) {
        sheet.style.marginBottom = kb + "px";

        sheet.style.height = "";
      }

      if (box) box.scrollTop = box.scrollHeight;
    };
    vv.addEventListener("resize", adjustForKeyboard);
    vv.addEventListener("scroll", adjustForKeyboard);
  }

function readFileBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onerror = () => reject(new Error("Datei konnte nicht gelesen werden."));
    r.onload = () => {
      const s = String(r.result);
      const i = s.indexOf(",");
      resolve(s.slice(i + 1));
    };
    r.readAsDataURL(file);
  });
}
function imageToJpegBase64(file, maxEdge) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      try {
        let w = img.naturalWidth, h = img.naturalHeight;
        const scale = Math.min(1, maxEdge / Math.max(w, h));
        w = Math.max(1, Math.round(w * scale));
        h = Math.max(1, Math.round(h * scale));
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
        URL.revokeObjectURL(url);
        resolve(dataUrl.slice(dataUrl.indexOf(",") + 1));
      } catch (e) {
        URL.revokeObjectURL(url);
        reject(new Error("Bild konnte nicht verarbeitet werden."));
      }
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error("Dieses Bildformat (z. B. iPhone-HEIC) kann dein Browser nicht lesen – bitte das Foto als JPG/PNG exportieren oder einen Screenshot verwenden."));
    };
    img.src = url;
  });
}
function extractCardsFromText(text) {
  // 1) Normaler Weg: komplettes JSON
  try {
    const obj = JSON.parse(text);
    if (obj && Array.isArray(obj.cards)) return { cards: obj.cards, truncated: false };
  } catch (e) {}
  // 2) Reparatur: vollständige Objekte aus dem cards-Array herausschneiden
  const start = text.indexOf("[");
  if (start === -1) return { cards: [], truncated: true };
  const cards = [];
  let depth = 0, inStr = false, escNext = false, objStart = -1;
  for (let i = start + 1; i < text.length; i++) {
    const ch = text[i];
    if (escNext) { escNext = false; continue; }
    if (ch === "\\") { if (inStr) escNext = true; continue; }
    if (ch === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (ch === "{") { if (depth === 0) objStart = i; depth++; }
    else if (ch === "}") {
      depth--;
      if (depth === 0 && objStart !== -1) {
        try {
          const o = JSON.parse(text.slice(objStart, i + 1));
          if (o && typeof o.front === "string" && typeof o.back === "string") cards.push(o);
        } catch (e) {}
        objStart = -1;
      }
    } else if (ch === "]" && depth === 0) break;
  }
  return { cards, truncated: true };
}
async function aiGenerateCards(file, targetCatId) {
  if (!state.settings.apiKey) { showAiKeyHintModal(); return; }
  const MAX_BYTES = 20 * 1024 * 1024;
  if (file.size > MAX_BYTES) { toast("Datei zu groß – bitte unter 20 MB (PDF ggf. aufteilen)."); return; }
  const isPdf = file.type === "application/pdf" || /\.pdf$/i.test(file.name || "");
  const isImg = /^image\//.test(file.type || "");
  if (!isPdf && !isImg) { toast("Bitte ein PDF oder ein Bild auswählen."); return; }

  state.review = { stage: "working", progressText: "Datei wird vorbereitet…", abort: new AbortController(), fileName: file.name };
  render();
  const R = state.review;
  const setStatus = (t) => {
    R.progressText = t;
    const elx = document.getElementById("gen-status");
    if (elx) elx.textContent = t;
  };

  try {
    let contentBlock;
    if (isPdf) {
      const b64 = await readFileBase64(file);
      contentBlock = { type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 } };
    } else {
      const direct = ["image/jpeg", "image/png", "image/webp", "image/gif"].includes(file.type);
      if (direct && file.size < 1.5 * 1024 * 1024) {
        contentBlock = { type: "image", source: { type: "base64", media_type: file.type, data: await readFileBase64(file) } };
      } else {
        // HEIC / große Fotos → per Canvas nach JPEG (max. 2000 px) umwandeln
        const b64 = await imageToJpegBase64(file, 2000);
        contentBlock = { type: "image", source: { type: "base64", media_type: "image/jpeg", data: b64 } };
      }
    }
    setStatus("Dokument wird analysiert…");

    const existing = state.categories.map(c => c.name);
    const targetCat = targetCatId ? getCategory(targetCatId) : null;
    const userPrompt =
      "Erstelle Karteikarten aus dem angehängten Dokument. " +
      "Vorhandene Kategorien: " + (existing.length ? existing.join(", ") : "(noch keine)") + ". " +
      (targetCat ? "Die Nutzerin möchte die Karten im Fach „" + targetCat.name + "“ ablegen – nutze das als categorySuggestion, wenn der Inhalt dazu passt." : "");

    const res = await anthropicFetch({
      model: GENERATION_MODEL,
      max_tokens: 64000,
      stream: true,
      thinking: { type: "adaptive" },
      output_config: { format: { type: "json_schema", schema: GEN_SCHEMA } },
      system: GEN_SYSTEM,
      messages: [{ role: "user", content: [contentBlock, { type: "text", text: userPrompt }] }]
    }, R.abort.signal);

    let acc = "";
    let truncatedByLimit = false;
    await streamSSE(res, (t) => {
      acc += t;
      const n = (acc.match(/"front"/g) || []).length;
      if (n > 0) setStatus(n + " Karten erkannt…");
    }, (ev) => {
      if (ev.type === "message_delta" && ev.delta && ev.delta.stop_reason === "max_tokens") truncatedByLimit = true;
    });

    const { cards, truncated } = extractCardsFromText(acc);
    // Validierung + Deduplizierung
    const seen = new Set();
    const clean = [];
    for (const c of cards) {
      const front = String(c.front || "").trim();
      const back = String(c.back || "").trim();
      if (!front || !back) continue;
      const key = front.toLowerCase();
      if (seen.has(key)) continue;
      seen.add(key);
      clean.push({
        front: front.slice(0, 1000),
        back: back.slice(0, 4000),
        categorySuggestion: String(c.categorySuggestion || "").trim().slice(0, 60),
        selected: true
      });
    }
    if (!clean.length) {
      state.review = null;
      toast("Keine lernrelevanten Inhalte gefunden – bitte anderes Dokument versuchen.");
      if (parseRoute().name === "import") render();
      return;
    }
    state.review = {
      stage: "review",
      fileName: file.name,
      targetCatId: targetCatId || null,
      truncated: truncatedByLimit || truncated,
      cards: clean
    };
    if (parseRoute().name === "import") render();
    else toast("✨ " + clean.length + " Kartenvorschläge sind fertig – öffne den KI-Import.", 4500);
  } catch (e) {
    state.review = null;
    if (e && e.name === "AbortError") toast("Import abgebrochen.");
    else toast("⚠️ " + (e.message || "Import fehlgeschlagen."), 4000);
    if (parseRoute().name === "import") render();
  }
}
